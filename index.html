<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💅 QUEEN'S HOTPLACE MAP 💅</title>
    <!-- 카카오맵 API 연결 (https 명시) -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b347991b64991c8976462057f3871353&libraries=services"></script>
    <!-- 핫걸 전용 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --hot-pink: #ff1493;
            --barbie-pink: #ff69b4;
            --leopard-dark: #222;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #000; /* 전체 배경은 시크한 블랙 */
            overflow: hidden;
        }

        #sidebar {
            width: 400px;
            height: 100vh;
            background-color: var(--barbie-pink);
            /* 호피무늬 패턴 적용 */
            background-image: 
                radial-gradient(var(--leopard-dark) 20%, transparent 20%),
                radial-gradient(var(--leopard-dark) 20%, transparent 20%);
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 50;
            box-shadow: 10px 0 30px rgba(255, 20, 147, 0.3);
        }

        .sidebar-inner {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 4px solid white;
            border-radius: 40px;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--hot-pink), #ff00ff);
            color: white;
            border-bottom: 4px solid white;
        }

        .header h1 {
            font-family: 'Bagel Fat One', cursive;
            font-size: 32px;
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 5px;
        }

        .search-container {
            padding: 20px;
            background: white;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #keyword {
            flex: 1;
            padding: 15px;
            border: 3px solid #ffc0cb;
            border-radius: 20px;
            font-weight: bold;
            color: var(--hot-pink);
            outline: none;
            font-size: 16px;
        }

        /* 절대 안 잘리는 GO 버튼 */
        .btn-go {
            flex-shrink: 0; 
            width: 80px;
            height: 55px;
            background: var(--hot-pink);
            color: white;
            border: 3px solid white;
            border-radius: 20px;
            font-family: 'Bagel Fat One', cursive;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c71585;
            transition: all 0.1s;
        }

        .btn-go:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #c71585;
        }

        #places-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .place-card {
            background: #fff0f5;
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 12px;
            border: 2px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }

        .place-card:hover {
            border-color: var(--hot-pink);
            transform: scale(1.02);
            background: white;
        }

        .place-card h3 {
            font-family: 'Bagel Fat One', cursive;
            color: var(--hot-pink);
            font-size: 18px;
            margin-bottom: 5px;
        }

        #map-area {
            flex: 1;
            padding: 30px;
            background: #1a1a1a;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 50px;
            border: 8px solid var(--hot-pink);
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.4);
        }

        /* 지도 위 오버레이 */
        .map-badge {
            position: absolute;
            top: 60px;
            right: 60px;
            z-index: 10;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            border: 3px solid var(--hot-pink);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* 인포윈도우 스타일 */
        .custom-iw {
            padding: 10px;
            background: white;
            color: var(--hot-pink);
            font-family: 'Bagel Fat One', cursive;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body class="flex">

    <!-- 사이드바 -->
    <div id="sidebar">
        <div class="sidebar-inner">
            <div class="header">
                <h1>QUEEN'S PICK 🐆</h1>
                <p class="text-[10px] tracking-[0.2em]">XOXO GOSSIP MAP</p>
            </div>
            
            <div class="search-container">
                <input type="text" id="keyword" placeholder="어디가 핫해? 💅" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button class="btn-go" onclick="searchPlaces()">GO</button>
            </div>

            <ul id="places-list">
                <!-- 결과가 여기에 뾰로롱 -->
                <div class="text-center mt-10 opacity-40">
                    <p class="text-4xl mb-4">🥂</p>
                    <p class="font-bold">언니, 검색해서 핫플 찾아봐!</p>
                </div>
            </ul>
        </div>
    </div>

    <!-- 지도 영역 -->
    <div id="map-area">
        <div id="map"></div>
        <div class="map-badge">
            <div class="pulse"></div>
            <span class="text-pink-600">QUEEN IS SEARCHING...</span>
        </div>
    </div>

    <script>
        let map;
        let markers = [];
        let ps = new kakao.maps.services.Places();
        let infowindow = new kakao.maps.InfoWindow({zIndex:1});

        window.onload = function() {
            initMap();
        };

        // 지도 초기화
        function initMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 5 // 요청하신 확대 레벨 5
            };

            map = new kakao.maps.Map(container, options);

            // 현재 위치 가져오기
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locPosition = new kakao.maps.LatLng(lat, lon);
                    
                    map.setCenter(locPosition);
                    createMarker(locPosition, "YOU ARE HERE 👑");
                }, function() {
                    console.log("위치 권한 거부당함! ㅠㅠ");
                });
            }
        }

        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.trim()) {
                return;
            }

            ps.keywordSearch(keyword, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    displayResults(data);
                } else {
                    alert("언니, 거기 안 핫한가 봐... 결과가 없어! 😭");
                }
            });
        }

        function displayResults(places) {
            const listEl = document.getElementById('places-list');
            const bounds = new kakao.maps.LatLngBounds();

            clearMarkers();
            listEl.innerHTML = '';

            places.forEach((place, i) => {
                const position = new kakao.maps.LatLng(place.y, place.x);
                const marker = createMarker(position, place.place_name);
                const item = createListItem(place, marker);

                bounds.extend(position);
                listEl.appendChild(item);
            });

            map.setBounds(bounds);
        }

        function createListItem(place, marker) {
            const li = document.createElement('li');
            li.className = 'place-card';
            li.innerHTML = `
                <h3>${place.place_name}</h3>
                <p class="text-xs text-gray-500">${place.road_address_name || place.address_name}</p>
                <div class="mt-2"><span class="text-[10px] bg-white text-pink-500 border border-pink-500 px-2 py-0.5 rounded-full font-bold">#PICK</span></div>
            `;

            li.onclick = () => {
                map.panTo(marker.getPosition());
                openInfoWindow(marker, place.place_name);
            };

            return li;
        }

        function createMarker(position, title) {
            const marker = new kakao.maps.Marker({
                position: position,
                map: map
            });

            kakao.maps.event.addListener(marker, 'click', () => {
                openInfoWindow(marker, title);
            });

            markers.push(marker);
            return marker;
        }

        function openInfoWindow(marker, title) {
            const content = `<div class="custom-iw">${title}</div>`;
            infowindow.setContent(content);
            infowindow.open(map, marker);
        }

        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
        }
    </script>
</body>
</html>
