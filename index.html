<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 초록지구 탐색기 (리필샵 & 빈티지샵) 🌿</title>
    <!-- 카카오 지도 라이브러리 로드 (로딩 오류 방지를 위해 autoload=false 설정) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b347991b64991c8976462057f3871353&libraries=services&autoload=false"></script>
    
    <style>
        /* 기본 스타일 리셋 (동글동글 깔끔한 디자인) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f9f4;
        }

        /* 화면을 왼쪽(사이드바)과 오른쪽(지도)으로 2분할 */
        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 디자인 (자연을 닮은 연초록과 베이지 톤) */
        .sidebar {
            width: 360px;
            height: 100%;
            background: #ffffff;
            box-shadow: 4px 0 15px rgba(46, 125, 50, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 상단 헤더 및 검색창 영역 */
        .header {
            padding: 24px 16px 16px 16px;
            background: #e8f5e9;
            text-align: center;
            border-bottom: 2px dashed #a5d6a7;
        }
        .header h1 {
            font-size: 1.35rem;
            color: #2e7d32;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        /* 동글동글 귀여운 검색창 스타일 */
        .search-box {
            display: flex;
            background: #ffffff;
            border: 2px solid #81c784;
            border-radius: 24px;
            padding: 6px 14px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.05);
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            color: #2e7d32;
        }
        .search-input::placeholder {
            color: #b9dbba;
        }
        .search-btn {
            background: none;
            border: none;
            color: #2e7d32;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* 가치 소비 친환경 탭 메뉴 */
        .tab-container {
            display: flex;
            padding: 12px 12px 0 12px;
            background: #e8f5e9;
            gap: 6px;
        }
        .tab-button {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 14px 14px 0 0;
            background: #c8e6c9;
            cursor: pointer;
            font-weight: bold;
            color: #718773;
            transition: all 0.3s ease;
            font-size: 0.88rem;
        }
        /* 활성화된 탭 스타일 (리필샵은 그린, 빈티지샵은 오렌지 브라운) */
        .tab-button.active.tab-refill {
            color: #ffffff;
            background: #4caf50; 
        }
        .tab-button.active.tab-vintage {
            color: #ffffff;
            background: #ff9800; 
        }

        /* 검색 결과 리스트 목록 */
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            background: #ffffff;
        }
        .results-list::-webkit-scrollbar {
            width: 6px;
        }
        .results-list::-webkit-scrollbar-thumb {
            background-color: #c8e6c9;
            border-radius: 10px;
        }

        /* 장소 카드 아이템 */
        .place-item {
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e8f5e9;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            background: #fafdfa;
        }
        .place-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.15);
            background: #ffffff;
            border-color: #a5d6a7;
        }
        .place-name {
            font-weight: bold;
            color: #1b5e20;
            font-size: 1.05rem;
            margin-bottom: 6px;
        }
        .place-desc {
            font-size: 0.85rem;
            color: #2e7d32;
            margin-bottom: 4px;
            font-style: italic;
        }
        .place-phone {
            font-size: 0.85rem;
            color: #666666;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1;
            height: 100%;
        }

        /* 귀여운 화살표 꼬리가 달린 커스텀 말풍선(오버레이) */
        .custom-bubble {
            background: #ffffff;
            border: 2px solid #4caf50;
            border-radius: 16px;
            padding: 12px 16px;
            box-shadow: 0px 6px 16px rgba(0,0,0,0.12);
            font-size: 13px;
            position: relative;
            bottom: 55px; 
            white-space: nowrap;
        }
        /* 말풍선 밑바닥의 귀여운 삼각 화살표 꼬리 */
        .custom-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
        }
        .custom-bubble::before {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: inherit; /* 부모의 border-color를 그대로 따라감 */
            display: block;
            width: 0;
            z-index: -1;
        }
        .bubble-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .bubble-info {
            color: #666666;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .bubble-phone {
            color: #555555;
            margin-bottom: 6px;
        }
        .bubble-link {
            display: inline-block;
            color: #ffffff;
            background: #4caf50;
            padding: 4px 10px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            transition: 0.2s;
        }
        .bubble-link:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 왼쪽 사이드바 영역 -->
        <div class="sidebar">
            <div class="header">
                <h1>🌿 초록지구 탐색기 🌿</h1>
                <!-- 귀여운 검색창 -->
                <div class="search-box">
                    <input type="text" id="keywordInput" class="search-input" placeholder="가게 이름을 입력해봐!" onkeypress="if(event.keyCode==13) searchShopByName();">
                    <button class="search-btn" onclick="searchShopByName()">🔍</button>
                </div>
            </div>
            
            <!-- 친환경 컨셉 탭 버튼 메뉴 -->
            <div class="tab-container">
                <button id="tabRefill" class="tab-button tab-refill active" onclick="changeTab('제로웨이스트')">🛒 리필/제로샵</button>
                <button id="tabVintage" class="tab-button tab-vintage" onclick="changeTab('빈티지숍')">🧸 개념소비 빈티지</button>
            </div>
            
            <!-- 리스트 출력 공간 -->
            <div id="placesList" class="results-list"></div>
        </div>

        <!-- 오른쪽 카카오 지도 영역 -->
        <div id="map" class="map-area"></div>
    </div>

    <script>
        // 전역 변수 설정
        let map;
        let placeService;
        let currentMarkers = [];
        let currentOverlay = null;
        let currentKeyword = "제로웨이스트"; // 초기 검색 키워드
        
        // 위치 권한 거부 시 띄울 기본 위치 (서울 성수동 근처 좌표)
        let userLatitude = 37.5446; 
        let userLongitude = 127.0561;

        // 사용자가 직접 추가한 소중한 제로웨이스트샵 스토어 리스트
        const customEcoShops = [
            {
                id: "custom_1",
                place_name: "지구샵",
                phone: "070-7721-1555",
                address_name: "서울 마포구 성미산로 155",
                place_url: "https://map.kakao.com/?q=지구샵%20연남점",
                x: "126.920556",
                y: "37.564532",
                desc: "수-일 11:00-21:00 (월화 휴무)"
            },
            {
                id: "custom_2",
                place_name: "더피커 (the picker)",
                phone: "070-4112-1130",
                address_name: "서울 성동구 왕십리로 115",
                place_url: "https://map.kakao.com/?q=더피커",
                x: "127.043542",
                y: "37.547348",
                desc: "국내 최초의 제로웨이스트 가치 스토어"
            },
            {
                id: "custom_3",
                place_name: "디어얼스 (Dear Earth)",
                phone: "0507-1351-4022",
                address_name: "서울 서대문구 수색로 43",
                place_url: "https://map.kakao.com/?q=디어얼스",
                x: "126.911674",
                y: "37.570776",
                desc: "일상을 가꾸는 친환경 리필 메이커"
            },
            {
                id: "custom_4",
                place_name: "송포어스 (SongforEarth)",
                phone: "070-8095-3507",
                address_name: "서울 강동구 풍성로35길 34",
                place_url: "https://map.kakao.com/?q=송포어스",
                x: "127.127814",
                y: "37.534241",
                desc: "지구를 위한 노래, 친환경 라이프샵"
            }
        ];

        // 1. 카카오 SDK가 완벽하게 로드된 후 실행하여 안전성 확보
        kakao.maps.load(function () {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    initMap(); 
                }, function (error) {
                    console.log("위치 권한 동의를 받지 못해 기본 좌표로 시작합니다.");
                    initMap(); 
                });
            } else {
                initMap();
            }
        });

        // 2. 지도 초기 설정 및 서비스 가동 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLatitude, userLongitude), // 접속한 위치 중심
                level: 5 // 지도 확대 레벨 5 설정
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places(); // 장소 검색 모듈 로드

            showUserLocationPin(); // 내 위치에 파란 점 찍기
            fetchEcoPlaces(); // 주변 친환경 매장 검색 실행
        }

        // 3. 내 현재 위치를 알려주는 파란색 점 표시 함수
        function showUserLocationPin() {
            const userPosition = new kakao.maps.LatLng(userLatitude, userLongitude);
            const pinImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png'; // 파란 마커
            const pinSize = new kakao.maps.Size(30, 30);
            const markerImage = new kakao.maps.MarkerImage(pinImageUrl, pinSize);

            const userMarker = new kakao.maps.Marker({
                position: userPosition,
                image: markerImage,
                map: map
            });
        }

        // 4. 리필샵 <-> 빈티지샵 탭 이동 기능 함수
        function changeTab(tabType) {
            const tabRefill = document.getElementById('tabRefill');
            const tabVintage = document.getElementById('tabVintage');

            if (tabType === '제로웨이스트') {
                tabRefill.classList.add('active');
                tabVintage.classList.remove('active');
                currentKeyword = "제로웨이스트";
            } else {
                tabVintage.classList.add('active');
                tabRefill.classList.remove('active');
                currentKeyword = "빈티지숍";
            }

            // 검색창을 비우고 새로운 카테고리로 데이터 갱신
            document.getElementById('keywordInput').value = "";
            fetchEcoPlaces();
        }

        // 5. 검색창에 특정 샵 이름을 치고 버튼 클릭 시 실행되는 함수
        function searchShopByName() {
            const searchInputText = document.getElementById('keywordInput').value.trim();
            if (!searchInputText) {
                alert("찾고 싶은 가게의 이름을 적어줘! 예) 알맹상점");
                return;
            }
            
            fetchEcoPlaces(searchInputText + " " + currentKeyword);
        }

        // 6. 카카오 서버에 키워드로 장소 요청을 보내는 함수
        function fetchEcoPlaces(customQuery) {
            clearOldMarkers();
            if (currentOverlay) currentOverlay.setMap(null);

            const finalQuery = customQuery || currentKeyword;

            // 내 위치 반경 2km 이내에서 키워드 서치
            placeService.keywordSearch(finalQuery, function(data, status, pagination) {
                let combinedData = [];

                // 탭이 '제로웨이스트'이고 특별히 다른 단어를 완전히 정밀 검색하는 게 아니라면, 커스텀 샵 리스트를 상단에 병합
                if (currentKeyword === "제로웨이스트") {
                    // 전체 리스트 보기 상태거나, 검색어가 있을 때 검색어가 커스텀 샵 이름에 포함되는 경우 필터링
                    const searchText = customQuery ? customQuery.replace(" 제로웨이스트", "").trim() : "";
                    const filteredCustom = customEcoShops.filter(shop => 
                        shop.place_name.includes(searchText) || shop.address_name.includes(searchText)
                    );
                    combinedData = [...filteredCustom];
                }

                if (status === kakao.maps.services.Status.OK) {
                    combinedData = [...combinedData, ...data];
                }

                const listContainer = document.getElementById('placesList');
                if (combinedData.length > 0) {
                    renderListAndMarkers(combinedData);
                } else {
                    listContainer.innerHTML = '<div class="place-item" style="text-align:center; color:#999; padding-top:40px;">주변 2km 안에 매장이 없거나 이름이 맞지 않아 😢</div>';
                }
            }, {
                location: new kakao.maps.LatLng(userLatitude, userLongitude),
                radius: 2000,
                sort: kakao.maps.services.SortBy.DISTANCE
            });
        }

        // 8. 지도에 색상 마커를 찍고 왼쪽에 리스트 카드를 채워주는 핵심 함수
        function renderListAndMarkers(shopList) {
            const listContainer = document.getElementById('placesList');
            listContainer.innerHTML = ''; // 리스트박스 초기화

            // 기본 디자인 컨셉 핀 색상 적용
            let markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/12_map_p/pin_g.png'; // 제로웨이스트 = 초록핀
            if (currentKeyword === '빈티지숍') {
                markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/12_map_p/pin_orange.png'; // 빈티지숍 = 오렌지핀
            }

            const markerSize = new kakao.maps.Size(31, 35);
            const shopMarkerImage = new kakao.maps.MarkerImage(markerImageUrl, markerSize);

            shopList.forEach((shop) => {
                const shopPosition = new kakao.maps.LatLng(shop.y, shop.x);

                // 지도 위에 친환경 샵 마커 생성
                const marker = new kakao.maps.Marker({
                    position: shopPosition,
                    image: shopMarkerImage,
                    map: map
                });
                currentMarkers.push(marker); // 마커 리셋 처리를 위해 배열 수집

                // 왼쪽 리스트 영역에 채워넣을 귀여운 div 태그 생성
                const itemElement = document.createElement('div');
                itemElement.className = 'place-item';
                
                let descHtml = shop.desc ? `<div class="place-desc">💡 ${shop.desc}</div>` : '';
                
                itemElement.innerHTML = `
                    <div class="place-name">${shop.place_name}</div>
                    ${descHtml}
                    <div class="place-phone">📞 ${shop.phone || '전화번호 미등록'}</div>
                `;

                // 리스트 아이템 클릭 시 처리 (중심 이동 + 귀여운 화살표 말풍선 개방)
                itemElement.onclick = function () {
                    map.panTo(shopPosition);
                    openArrowOverlay(shop, marker);
                };
                listContainer.appendChild(itemElement);

                // 지도 마커 클릭 시에도 동일하게 화살표 말풍선 개방
                kakao.maps.event.addListener(marker, 'click', function () {
                    map.panTo(shopPosition);
                    openArrowOverlay(shop, marker);
                });
            });
        }

        // 9. 귀여운 화살표 꼬리가 달린 커스텀 말풍선을 띄워주는 함수
        function openArrowOverlay(shop, marker) {
            if (currentOverlay) {
                currentOverlay.setMap(null);
            }

            // 현재 선택된 테마에 맞춰 말풍선의 포인트 색상과 어울리는 톤앤매너 매칭
            const themeColor = (currentKeyword === '제로웨이스트') ? '#4caf50' : '#ff9800';
            const titleColor = (currentKeyword === '제로웨이스트') ? '#1b5e20' : '#e65100';

            let infoHtml = shop.desc ? `<div class="bubble-info">📝 ${shop.desc}</div>` : `<div class="bubble-info">📍 ${shop.address_name || '주소 정보 없음'}</div>`;

            // 화살표 꼬리가 달린 커스텀 말풍선 내용 구조 생성
            const bubbleContent = `
                <div class="custom-bubble" style="border-color: ${themeColor};">
                    <div class="bubble-title" style="color: ${titleColor};">✨ ${shop.place_name}</div>
                    ${infoHtml}
                    <div class="bubble-phone">📱 ${shop.phone || '번호 없음'}</div>
                    <a class="bubble-link" href="${shop.place_url}" target="_blank" style="background-color: ${themeColor};">카카오맵 정보 보기 ↗</a>
                </div>
            `;

            currentOverlay = new kakao.maps.CustomOverlay({
                content: bubbleContent,
                position: marker.getPosition(),
                xAnchor: 0.5,
                yAnchor: 1.0 // 마커 꼭대기에 화살표 끝이 딱 붙도록 설정!
            });

            currentOverlay.setMap(map);
        }

        // 10. 기존의 마커 흔적들을 모두 삭제해주는 초기화 함수
        function clearOldMarkers() {
            currentMarkers.forEach(marker => marker.setMap(null));
            currentMarkers = [];
        }
    </script>
</body>
</html>
