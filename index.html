<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ 예쁜 카페 탐색기</title>
    <!-- 카카오 지도 라이브러리 로드 (autoload=false 필수) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b347991b64991c8976462057f3871353&libraries=services&autoload=false"></script>
    
    <style>
        /* 기본 스타일 리셋 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 메인 컨테이너: 왼쪽 리스트 + 오른쪽 지도 2분할 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 스타일 */
        .sidebar {
            width: 350px;
            height: 100%;
            background: #ffffff;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .header {
            padding: 20px;
            background: #ffeaa7;
            text-align: center;
        }
        .header h1 {
            font-size: 1.3rem;
            color: #2d3436;
        }

        /* 탭 메뉴 스타일 */
        .tab-group {
            display: flex;
            background: #f1f2f6;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: bold;
            color: #747d8c;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #ff7675;
            border-bottom: 3px solid #ff7675;
            background: #ffffff;
        }

        /* 결과 리스트 영역 */
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .place-item {
            padding: 15px;
            border-bottom: 1px solid #f1f2f6;
            cursor: pointer;
            transition: 0.2s;
        }
        .place-item:hover {
            background: #fafafa;
        }
        .place-name {
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 5px;
        }
        .place-phone {
            font-size: 0.85rem;
            color: #747d8c;
        }

        /* 오른쪽 지도 영역 */
        .map-container {
            flex: 1;
            height: 100%;
        }

        /* 커스텀 오버레이(말풍선) 스타일 */
        .custom-overlay {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.2);
            font-size: 13px;
            position: relative;
            bottom: 50px;
            white-space: nowrap;
        }
        .overlay-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }
        .overlay-link {
            display: inline-block;
            margin-top: 6px;
            color: #0984e3;
            text-decoration: none;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽 사이드바 -->
        <div class="sidebar">
            <div class="header">
                <h1>☕ 예쁜 카페 탐색기</h1>
            </div>
            <!-- 탭 버튼 -->
            <div class="tab-group">
                <button class="tab-btn active" onclick="switchTab('CV7', this)">⏰ 24시 카페</button>
                <button class="tab-btn" onclick="switchTab('HP8', this)">✨ 일반 카페</button>
            </div>
            <!-- 검색 결과 목록 -->
            <div id="placesList" class="results-list"></div>
        </div>

        <!-- 오른쪽 지도 -->
        <div id="map" class="map-container"></div>
    </div>

    <script>
        // 전역 변수 선언
        let map;
        let placeService;
        let currentMarkers = [];
        let currentOverlay = null;
        let userLatitude = 37.566826; // 기본값 (서울시청)
        let userLongitude = 126.9786567;
        let currentCategory = 'CV7'; // 초기 활성화 탭 (24시 카페 코드)

        // 카카오 지도 SDK 로드가 완료된 후 실행
        kakao.maps.load(function () {
            // 브라우저가 GPS 위치 권한을 지원하는지 확인
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    initMap(); // 내 위치 기준으로 지도 초기화
                }, function (error) {
                    console.log("위치 권한을 거부하셨거나 오류가 발생하여 기본 위치로 맵을 켭니다.");
                    initMap(); // 실패 시 기본값으로 지도 초기화
                });
            } else {
                initMap();
            }
        });

        // 지도 및 서비스 초기화 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLatitude, userLongitude), // 중심 좌표
                level: 5 // 지도 확대 레벨
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places(map); // 장소 검색 객체 생성

            showUserMarker(); // 내 위치에 파란 점 표시
            searchPlaces(); // 현재 선택된 카테고리 검색 실행
        }

        // 내 현재 위치를 파란색 점(마커)으로 표시하는 함수
        function showUserMarker() {
            const userPosition = new kakao.maps.LatLng(userLatitude, userLongitude);
            
            // 파란색 원형 마커 이미지 생성 (카카오 기본 제공 이미지 활용)
            const markerImageSource = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png';
            const imageSize = new kakao.maps.Size(30, 30);
            const userMarkerImage = new kakao.maps.MarkerImage(markerImageSource, imageSize);

            const userMarker = new kakao.maps.Marker({
                position: userPosition,
                image: userMarkerImage,
                map: map
            });
        }

        // 탭 전환 함수
        function switchTab(categoryCode, element) {
            // 탭 버튼 활성화 스타일 변경
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // 카테고리 변경 후 검색 재요청
            currentCategory = categoryCode;
            searchPlaces();
        }

        // 카카오 API를 이용해 카테고리 장소를 검색하는 함수
        function searchPlaces() {
            // 기존 마커와 오버레이 모두 제거
            clearMarkers();
            if (currentOverlay) currentOverlay.setMap(null);

            // 주변 카테고리 검색 조건 설정
            placeService.categorySearch(currentCategory, placesSearchCB, {
                location: new kakao.maps.LatLng(userLatitude, userLongitude),
                radius: 2000, // 중심 기준 2km 반경
                sort: kakao.maps.services.SortBy.DISTANCE // 거리순 정렬
            });
        }

        // 장소 검색 완료 시 호출되는 콜백 함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data); // 리스트 및 마커 표시
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                document.getElementById('placesList').innerHTML = '<div class="place-item">주변에 검색 결과가 없습니다.</div>';
            } else {
                alert('장소 검색 중 오류가 발생했습니다.');
            }
        }

        // 검색된 장소들을 리스트와 지도에 뿌려주는 함수
        function displayPlaces(places) {
            const listContainer = document.getElementById('placesList');
            listContainer.innerHTML = ''; // 기존 리스트 초기화

            // 조건에 따른 마커 색상 이미지 설정
            // 핑크 마커(CV7 = 24시 카페 가정), 하늘색 마커(HP8 = 일반 카페 가정)
            let markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/12_map_p/pin_b.png'; // 기본 하늘색
            if (currentCategory === 'CV7') {
                markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/12_map_p/pin_r.png'; // 핑크계열(붉은색)
            }

            const imageSize = new kakao.maps.Size(31, 35);
            const markerImage = new kakao.maps.MarkerImage(markerImageUrl, imageSize);

            places.forEach((place, index) => {
                const placePosition = new kakao.maps.LatLng(place.y, place.x);

                // 1. 지도에 마커 생성 및 표시
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    image: markerImage,
                    map: map
                });
                currentMarkers.push(marker); // 추후 삭제를 위해 배열에 저장

                // 2. 왼쪽 사이드바에 항목 추가
                const itemElement = document.createElement('div');
                itemElement.className = 'place-item';
                itemElement.innerHTML = `
                    <div class="place-name">${place.place_name}</div>
                    <div class="place-phone">${place.phone || '전화번호 없음'}</div>
                `;

                // 리스트 아이템 클릭 시 지도 해당 위치로 이동 및 말풍선 띄우기
                itemElement.onclick = function () {
                    map.panTo(placePosition);
                    showOverlay(place, marker);
                };
                listContainer.appendChild(itemElement);

                // 3. 마커 클릭 시 커스텀 말풍선(오버레이) 표시 이벤트 등록
                kakao.maps.event.addListener(marker, 'click', function () {
                    showOverlay(place, marker);
                });
            });
        }

        // 커스텀 말풍선(오버레이)를 지도에 띄우는 함수
        function showOverlay(place, marker) {
            // 열려있는 오버레이가 있다면 닫기
            if (currentOverlay) {
                currentOverlay.setMap(null);
            }

            // 말풍선 내부 HTML 구성 (장소 이름, 전화번호, 카카오맵 상세 링크)
            const content = `
                <div class="custom-overlay">
                    <div class="overlay-title">${place.place_name}</div>
                    <div>📞 ${place.phone || '번호 없음'}</div>
                    <a class="overlay-link" href="${place.place_url}" target="_blank">👉 카카오맵 상세 보기</a>
                </div>
            `;

            currentOverlay = new kakao.maps.CustomOverlay({
                content: content,
                position: marker.getPosition(),
                xAnchor: 0.5,
                yAnchor: 1.0
            });

            currentOverlay.setMap(map);
        }

        // 지도 위의 마커들을 모두 지우는 함수
        function clearMarkers() {
            currentMarkers.forEach(marker => marker.setMap(null));
            currentMarkers = [];
        }
    </script>
</body>
</html>
