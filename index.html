<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💅 QUEEN'S HOTPLACE MAP 💅</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b347991b64991c8976462057f3871353&libraries=services"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --hot-pink: #ff1493;
            --barbie-pink: #ff69b4;
            --leopard-dark: #222;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --gold: #ffd700;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #ffe4e1;
            overflow: hidden;
        }

        #sidebar {
            width: 420px;
            height: 100vh;
            background-color: var(--barbie-pink);
            background-image: 
                radial-gradient(var(--leopard-dark) 20%, transparent 20%),
                radial-gradient(var(--leopard-dark) 20%, transparent 20%);
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px; 
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
            z-index: 50;
            flex-shrink: 0;
        }

        .sidebar-inner {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 5px solid white;
            border-radius: 40px;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(255, 20, 147, 0.2);
        }

        .header {
            padding: 35px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--hot-pink), #ff00ff);
            color: white;
            border-bottom: 5px solid white;
        }

        .header h1 {
            font-family: 'Bagel Fat One', cursive;
            font-size: 36px;
            text-shadow: 4px 4px 0px #000;
            line-height: 1;
            margin-bottom: 8px;
        }

        .search-container {
            padding: 20px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 2px solid #ffe4e1;
        }

        .search-row {
            display: flex;
            gap: 8px;
            width: 100%;
            align-items: center;
        }

        #keyword {
            flex: 1;
            min-width: 0; /* flex 박스 내에서 input이 줄어들 수 있게 설정 */
            padding: 14px 18px;
            border: 4px solid #ffc0cb;
            border-radius: 25px;
            font-weight: bold;
            color: var(--hot-pink);
            outline: none;
            font-size: 16px;
        }

        .btn-go {
            flex-shrink: 0; /* 버튼이 절대 찌그러지지 않게 */
            width: 75px;
            height: 52px;
            background: var(--hot-pink);
            color: white;
            border: 3px solid white;
            border-radius: 20px;
            font-family: 'Bagel Fat One', cursive;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 5px 0 #c71585;
            transition: all 0.1s;
        }

        .btn-go:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #c71585;
        }

        #places-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fffafa;
        }

        .place-card {
            background: white;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 15px;
            border: 3px solid #ffe4e1;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .place-card:hover {
            transform: scale(1.02) rotate(-1deg);
            border-color: var(--hot-pink);
            box-shadow: 0 10px 20px rgba(255,20,147,0.15);
        }

        .place-card h3 {
            font-family: 'Bagel Fat One', cursive;
            color: var(--hot-pink);
            font-size: 20px;
        }

        #map-container {
            flex: 1;
            position: relative;
            background: #000;
            padding: 10px; /* 지도를 감싸는 럭셔리 프레임 효과 */
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 30px; /* 지도도 둥글게! */
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .map-overlay-header {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 4px solid var(--hot-pink);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .custom-iw {
            padding: 10px 15px;
            background: white;
            border-radius: 20px;
            border: 3px solid var(--hot-pink);
            font-family: 'Bagel Fat One', cursive;
            color: var(--hot-pink);
            text-align: center;
            font-size: 14px;
        }

        /* 스크롤바까지 핑크로! */
        #places-list::-webkit-scrollbar { width: 10px; }
        #places-list::-webkit-scrollbar-thumb { background: var(--hot-pink); border-radius: 10px; border: 3px solid #fffafa; }
    </style>
</head>
<body class="flex">

    <div id="sidebar">
        <div class="sidebar-inner">
            <div class="header">
                <h1>QUEEN'S PICK 🐆</h1>
                <p class="text-[11px] font-bold tracking-[0.2em] opacity-90">ONLY THE HOTTEST PLACES FOR YOU</p>
            </div>
            
            <div class="search-container">
                <div class="search-row">
                    <input type="text" id="keyword" placeholder="어디가 핫해? 💅" onkeypress="if(event.keyCode==13) searchPlaces()">
                    <button class="btn-go" onclick="searchPlaces()">GO</button>
                </div>
                <div class="flex justify-between items-center px-2 mt-1">
                    <span class="text-[10px] text-pink-500 font-extrabold uppercase">#Trends #JeeHeeStyle</span>
                    <span class="text-[10px] text-gray-400 font-bold">XOXO Map</span>
                </div>
            </div>

            <ul id="places-list">
                <div class="h-full flex flex-col items-center justify-center opacity-30 text-center px-10">
                    <span class="text-6xl mb-6">🥂</span>
                    <p class="font-bold text-lg leading-tight">자기야, 검색어를 입력하면<br>내가 제일 핫한 곳만 골라줄게!</p>
                </div>
            </ul>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        
        <!-- 지도 위 플로팅 장식 -->
        <div class="map-overlay-header">
            <div class="status-dot"></div>
            <span class="font-bold text-gray-800 text-sm tracking-tighter">QUEEN'S RADAR: <span class="text-pink-500">SCANNING...</span></span>
        </div>

        <div class="absolute bottom-10 right-10 z-[100] bg-black/80 text-white p-4 rounded-3xl border-2 border-pink-500 backdrop-blur-sm text-xs font-bold">
            📍 Current Zoom: Level 5
        </div>
    </div>

    <div id="msg-box" class="fixed top-12 left-1/2 -translate-x-1/2 z-[200] bg-hot-pink bg-[#ff1493] text-white px-10 py-4 rounded-full font-bold shadow-[0_0_30px_rgba(255,20,147,0.5)] hidden transition-all duration-300 border-2 border-white">
    </div>

    <script>
        let map;
        let markers = [];
        let placeSearch = new kakao.maps.services.Places();
        let infoWindow = new kakao.maps.InfoWindow({ zIndex: 10 });

        window.onload = function() {
            initMap();
        };

        function initMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 5 // 요청하신 확대 레벨 5
            };

            map = new kakao.maps.Map(container, options);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const currentPos = new kakao.maps.LatLng(lat, lon);
                    
                    map.setCenter(currentPos);
                    createMarker(currentPos, "YOU ARE HERE ✨");
                    showMsg("자기를 찾았어! 완전 반가워 💋");
                }, function() {
                    showMsg("위치 권한 좀 빌려줘, 자기! 😭");
                });
            }
        }

        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.trim()) {
                showMsg("검색어를 입력해야 핫플을 찾지! 🎀");
                return;
            }

            placeSearch.keywordSearch(keyword, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    renderResults(data);
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    showMsg("어머, 그런 촌스러운 곳은 안 나와! 💅");
                } else {
                    showMsg("에러 났어! 완전 짜증나! 💣");
                }
            });
        }

        function renderResults(places) {
            const listContainer = document.getElementById('places-list');
            const bounds = new kakao.maps.LatLngBounds();

            clearMarkers();
            listContainer.innerHTML = '';

            places.forEach((place) => {
                const position = new kakao.maps.LatLng(place.y, place.x);
                const marker = createMarker(position, place.place_name);
                const item = createPlaceItem(place, marker);

                bounds.extend(position);
                listContainer.appendChild(item);
            });

            map.setBounds(bounds);
        }

        function createPlaceItem(place, marker) {
            const li = document.createElement('li');
            li.className = 'place-card';
            li.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <h3>${place.place_name}</h3>
                    <span class="text-[10px] bg-pink-100 text-pink-600 px-2 py-1 rounded-full font-bold">PICK</span>
                </div>
                <p class="text-xs text-gray-500 font-medium">${place.road_address_name || place.address_name}</p>
                <div class="mt-4 flex gap-2 overflow-hidden">
                    <span class="text-[9px] border border-pink-300 text-pink-400 px-2 py-0.5 rounded-md font-bold whitespace-nowrap">#GOURMET</span>
                    <span class="text-[9px] border border-pink-300 text-pink-400 px-2 py-0.5 rounded-md font-bold whitespace-nowrap">#QUEEN_APPROVED</span>
                </div>
            `;
            
            li.onclick = () => {
                map.panTo(marker.getPosition());
                openInfoWindow(marker, place.place_name);
            };

            return li;
        }

        function createMarker(position, title) {
            const marker = new kakao.maps.Marker({
                position: position,
                map: map
            });

            kakao.maps.event.addListener(marker, 'click', () => {
                openInfoWindow(marker, title);
            });

            markers.push(marker);
            return marker;
        }

        function openInfoWindow(marker, title) {
            const content = `<div class="custom-iw">${title}</div>`;
            infoWindow.setContent(content);
            infoWindow.open(map, marker);
        }

        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
        }

        function showMsg(text) {
            const box = document.getElementById('msg-box');
            box.innerText = text;
            box.classList.remove('hidden');
            box.style.animation = 'fadeInDown 0.5s ease-out';
            
            setTimeout(() => {
                box.classList.add('hidden');
            }, 3000);
        }
    </script>

    <style>
        @keyframes fadeInDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</body>
</html>
