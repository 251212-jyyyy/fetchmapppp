    <style>
        /* 기본 스타일 리셋 (동글동글 깔끔한 디자인) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f9f4;
        }

        /* 화면을 왼쪽(사이드바)과 오른쪽(지도)으로 2분할 */
        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 디자인 */
        .sidebar {
            width: 360px;
            height: 100%;
            background: #ffffff;
            box-shadow: 4px 0 15px rgba(46, 125, 50, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 상단 헤더 및 검색창 영역 */
        .header {
            padding: 24px 16px 16px 16px;
            background: #e8f5e9;
            text-align: center;
            border-bottom: 2px dashed #a5d6a7;
        }
        .header h1 {
            font-size: 1.35rem;
            color: #2e7d32;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        /* 동글동글 귀여운 검색창 스타일 */
        .search-box {
            display: flex;
            background: #ffffff;
            border: 2px solid #81c784;
            border-radius: 24px;
            padding: 6px 14px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.05);
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            color: #2e7d32;
        }
        .search-input::placeholder {
            color: #b9dbba;
        }
        .search-btn {
            background: none;
            border: none;
            color: #2e7d32;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* 가치 소비 친환경 탭 메뉴 */
        .tab-container {
            display: flex;
            padding: 12px 12px 0 12px;
            background: #e8f5e9;
            gap: 6px;
        }
        .tab-button {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 14px 14px 0 0;
            background: #c8e6c9;
            cursor: pointer;
            font-weight: bold;
            color: #718773;
            transition: all 0.3s ease;
            font-size: 0.88rem;
        }
        .tab-button.active.tab-refill {
            color: #ffffff;
            background: #4caf50; 
        }
        .tab-button.active.tab-vintage {
            color: #ffffff;
            background: #ff9800; 
        }

        /* 검색 결과 리스트 목록 */
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            background: #ffffff;
        }
        .results-list::-webkit-scrollbar {
            width: 6px;
        }
        .results-list::-webkit-scrollbar-thumb {
            background-color: #c8e6c9;
            border-radius: 10px;
        }

        /* 장소 카드 아이템 */
        .place-item {
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e8f5e9;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            background: #fafdfa;
        }
        .place-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.15);
            background: #ffffff;
            border-color: #a5d6a7;
        }
        .place-name {
            font-weight: bold;
            color: #1b5e20;
            font-size: 1.05rem;
            margin-bottom: 6px;
        }
        .place-desc {
            font-size: 0.85rem;
            color: #2e7d32;
            margin-bottom: 4px;
            font-style: italic;
        }
        .place-phone {
            font-size: 0.85rem;
            color: #666666;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1;
            height: 100%;
        }

        /* 귀여운 원형 이모지 마커 스타일 */
        .cute-marker {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.15);
            border: 3px solid #4caf50;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .cute-marker:hover {
            transform: scale(1.15);
        }

        /* 커스텀 말풍선(오버레이) */
        .custom-bubble {
            background: #ffffff;
            border: 2px solid #4caf50;
            border-radius: 16px;
            padding: 12px 16px;
            box-shadow: 0px 6px 16px rgba(0,0,0,0.12);
            font-size: 13px;
            position: relative;
            bottom: 60px; 
            white-space: nowrap;
        }
        .custom-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
        }
        .custom-bubble::before {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: inherit;
            display: block;
            width: 0;
            z-index: -1;
        }
        .bubble-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .bubble-info {
            color: #666666;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .bubble-phone {
            color: #555555;
            margin-bottom: 6px;
        }
        .bubble-link {
            display: inline-block;
            color: #ffffff;
            background: #4caf50;
            padding: 4px 10px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            transition: 0.2s;
        }
        .bubble-link:hover {
            opacity: 0.85;
        }
    </style>
</head>

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    initMap(); 
                }, function (error) {
                    console.log("위치 권한 거부 등으로 기본 좌표(성수동)를 사용합니다.");
                    initMap(); 
                });
            } else {
                initMap();
            }
        });

        // 2. 지도 초기 설정
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLatitude, userLongitude), // 접속한 내 위치 중심 시작
                level: 10 // ★ 전국의 매장 마커들이 처음에 동시에 쫙 펼쳐지도록 축척 레벨을 10으로 확대 조절! ★
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places(); 

            showUserLocationPin(); // 내 위치 파란 점 찍기
            fetchEcoPlaces(); // ★ 첫 시작할 때 성수동만 보지 않고 전국 고정 매장 싹 다 표출 ★
        }

        // 3. 내 현재 위치 파란 점 표시
        function showUserLocationPin() {
            const userPosition = new kakao.maps.LatLng(userLatitude, userLongitude);
            const pinImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png';
            const pinSize = new kakao.maps.Size(30, 30);
            const markerImage = new kakao.maps.MarkerImage(pinImageUrl, pinSize);

            new kakao.maps.Marker({
                position: userPosition,
                image: markerImage,
                map: map
            });
        }

                tabVintage.classList.remove('active');
                currentKeyword = "제로웨이스트";
            } else {
                tabVintage.classList.add('active');
                tabRefill.classList.remove('active');
                currentKeyword = "빈티지숍";
            }

            document.getElementById('keywordInput').value = ""; 
            fetchEcoPlaces(); // 탭 이동 시 해당 탭에 해당하는 전국구 매장 리스트로 교체
        }

        // 5. 검색창 기능 (이름이나 지역명 검색)
        function searchShopByName() {
            const searchInputText = document.getElementById('keywordInput').value.trim();
            if (!searchInputText) {
                alert("찾고 싶은 가게 이름이나 지역을 적어줘! 예) 지구샵 또는 부산");
                return;
            }
            fetchEcoPlaces(searchInputText, true);
        }

        // 6. 데이터 필터링 및 표출 코어 (카카오 API 한계를 깨고 고정 DB 기반 전국 와이드 실현)
        function fetchEcoPlaces(queryText = "", isSearchMode = false) {
            clearOldMarkers();
            if (currentOverlay) currentOverlay.setMap(null);

            let filteredList = [];

            if (!isSearchMode) {
                // [기본 상태] 현재 활성화된 탭(제로웨이스트 또는 빈티지숍)에 속한 전국의 모든 상점을 선별
                filteredList = totalNationalShops.filter(shop => shop.type === currentKeyword);
            } else {
                // [검색 모드] 현재 활성화된 탭 내부에서 유저가 입력한 텍스트(상점명 혹은 지역명)가 포함된 대상을 전국 스캔
                filteredList = totalNationalShops.filter(shop => 
                    shop.type === currentKeyword && 
                    (shop.place_name.includes(queryText) || shop.address_name.includes(queryText))
                );
            }

            const listContainer = document.getElementById('placesList');

            if (filteredList.length > 0) {
                renderListAndMarkers(filteredList);
                
                // 유저가 검색창을 통해 특정 매장을 정확히 조준 검색한 거라면 해당 상점 위치로 지도를 이동
                if (isSearchMode) {
                    const targetPos = new kakao.maps.LatLng(filteredList[0].y, filteredList[0].x);
                    map.setCenter(targetPos);
                    map.setLevel(5); // 타겟 매장을 자세히 볼 수 있게 줌인
                }
            } else {
                // 검색 결과가 아예 없는 경우 리셋 알림 후 첫 화면 복귀
                alert("원하는 조건의 친환경 매장을 찾지 못했어 😢 대신 전국의 알찬 리스트 화면으로 돌아갈게!");
                document.getElementById('keywordInput').value = ""; 
                fetchEcoPlaces(); 
            }
        }

        // 7. 귀여운 원형 이모지 커스텀 마커 제작 및 전국 지도에 동시 렌더링
        function renderListAndMarkers(shopList) {
            const listContainer = document.getElementById('placesList');
            listContainer.innerHTML = ''; 

            const isRefill = (currentKeyword === '제로웨이스트');
            const emojiIcon = isRefill ? '🛒' : '🧸';
            const borderThemeColor = isRefill ? '#4caf50' : '#ff9800';

            shopList.forEach((shop) => {
                const shopPosition = new kakao.maps.LatLng(shop.y, shop.x);

                // 동글동글 원형 🛒 / 🧸 커스텀 이모지 레이어 생성
                const markerContent = document.createElement('div');
                markerContent.className = 'cute-marker';
                markerContent.style.borderColor = borderThemeColor;
                markerContent.innerHTML = emojiIcon;

                const cuteOverlayMarker = new kakao.maps.CustomOverlay({
                    position: shopPosition,
                    content: markerContent,
                    xAnchor: 0.5,
                    yAnchor: 0.5
                });

                cuteOverlayMarker.setMap(map);
                currentMarkers.push(cuteOverlayMarker); 

                // 왼쪽 리스트 영역 카드 제작
                const itemElement = document.createElement('div');
                itemElement.className = 'place-item';
                let descHtml = shop.desc ? `<div class="place-desc">💡 ${shop.desc}</div>` : '';
                
                itemElement.innerHTML = `
                    <div class="place-name">${shop.place_name}</div>
                    ${descHtml}
                    <div class="place-phone">📞 ${shop.phone || '전화번호 미등록'}</div>
                `;

                // 마커 클릭 & 사이드바 카드 클릭 이벤트 동시 연결
                const selectEventAction = function () {
                    map.panTo(shopPosition);
                    openArrowOverlay(shop, shopPosition);
                };

                itemElement.onclick = selectEventAction;
                markerContent.onclick = selectEventAction;

                listContainer.appendChild(itemElement);
            });
        }

        // 8. 마커 선택 시 꼬리 달린 예쁜 말풍선 피어오르기
        function openArrowOverlay(shop, position) {
            if (currentOverlay) {
                currentOverlay.setMap(null);
            }

            const themeColor = (currentKeyword === '제로웨이스트') ? '#4caf50' : '#ff9800';
            const titleColor = (currentKeyword === '제로웨이스트') ? '#1b5e20' : '#e65100';
            let infoHtml = shop.desc ? `<div class="bubble-info">📝 ${shop.desc}</div>` : `<div class="bubble-info">📍 ${shop.address_name || '주소 정보 없음'}</div>`;

            const bubbleContent = `
                <div class="custom-bubble" style="border-color: ${themeColor};">
                    <div class="bubble-title" style="color: ${titleColor};">✨ ${shop.place_name}</div>
                    ${infoHtml}
                    <div class="bubble-phone">📱 ${shop.phone || '번호 없음'}</div>
                    <a class="bubble-link" href="${shop.place_url}" target="_blank" style="background-color: ${themeColor};">카카오맵 정보 보기 ↗</a>
                </div>
            `;

            currentOverlay = new kakao.maps.CustomOverlay({
                content: bubbleContent,
                position: position,
                xAnchor: 0.5,
                yAnchor: 1.0 
            });

            currentOverlay.setMap(map);
        }

        // 9. 마커 지우기 (초기화)
        function clearOldMarkers() {
            currentMarkers.forEach(marker => marker.setMap(null));
            currentMarkers = [];
        }
    </script>
</body>
</html>
