<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 초록지구 탐색기 (리필샵 & 빈티지샵) 🌿</title>
    <!-- 카카오 지도 라이브러리 로드 (로딩 오류 방지를 위해 autoload=false 설정) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b347991b64991c8976462057f3871353&libraries=services&autoload=false"></script>
    
    <style>
        /* 기본 스타일 리셋 (동글동글 깔끔한 디자인) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f9f4;
        }

        /* 화면을 왼쪽(사이드바)과 오른쪽(지도)으로 2분할 */
        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 디자인 */
        .sidebar {
            width: 360px;
            height: 100%;
            background: #ffffff;
            box-shadow: 4px 0 15px rgba(46, 125, 50, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 상단 헤더 및 검색창 영역 */
        .header {
            padding: 24px 16px 16px 16px;
            background: #e8f5e9;
            text-align: center;
            border-bottom: 2px dashed #a5d6a7;
        }
        .header h1 {
            font-size: 1.35rem;
            color: #2e7d32;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        /* 동글동글 귀여운 검색창 스타일 */
        .search-box {
            display: flex;
            background: #ffffff;
            border: 2px solid #81c784;
            border-radius: 24px;
            padding: 6px 14px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.05);
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            color: #2e7d32;
        }
        .search-input::placeholder {
            color: #b9dbba;
        }
        .search-btn {
            background: none;
            border: none;
            color: #2e7d32;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* 가치 소비 친환경 탭 메뉴 */
        .tab-container {
            display: flex;
            padding: 12px 12px 0 12px;
            background: #e8f5e9;
            gap: 6px;
        }
        .tab-button {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 14px 14px 0 0;
            background: #c8e6c9;
            cursor: pointer;
            font-weight: bold;
            color: #718773;
            transition: all 0.3s ease;
            font-size: 0.88rem;
        }
        .tab-button.active.tab-refill {
            color: #ffffff;
            background: #4caf50; 
        }
        .tab-button.active.tab-vintage {
            color: #ffffff;
            background: #ff9800; 
        }

        /* 검색 결과 리스트 목록 */
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            background: #ffffff;
        }
        .results-list::-webkit-scrollbar {
            width: 6px;
        }
        .results-list::-webkit-scrollbar-thumb {
            background-color: #c8e6c9;
            border-radius: 10px;
        }

        /* 장소 카드 아이템 */
        .place-item {
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e8f5e9;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            background: #fafdfa;
        }
        .place-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.15);
            background: #ffffff;
            border-color: #a5d6a7;
        }
        .place-name {
            font-weight: bold;
            color: #1b5e20;
            font-size: 1.05rem;
            margin-bottom: 6px;
        }
        .place-desc {
            font-size: 0.85rem;
            color: #2e7d32;
            margin-bottom: 4px;
            font-style: italic;
        }
        .place-phone {
            font-size: 0.85rem;
            color: #666666;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1;
            height: 100%;
        }

        /* 귀여운 원형 이모지 마커 스타일 */
        .cute-marker {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.15);
            border: 3px solid #4caf50;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .cute-marker:hover {
            transform: scale(1.15);
        }

        /* 커스텀 말풍선(오버레이) */
        .custom-bubble {
            background: #ffffff;
            border: 2px solid #4caf50;
            border-radius: 16px;
            padding: 12px 16px;
            box-shadow: 0px 6px 16px rgba(0,0,0,0.12);
            font-size: 13px;
            position: relative;
            bottom: 60px; 
            white-space: nowrap;
        }
        .custom-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
        }
        .custom-bubble::before {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: inherit;
            display: block;
            width: 0;
            z-index: -1;
        }
        .bubble-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .bubble-info {
            color: #666666;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .bubble-phone {
            color: #555555;
            margin-bottom: 6px;
        }
        .bubble-link {
            display: inline-block;
            color: #ffffff;
            background: #4caf50;
            padding: 4px 10px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            transition: 0.2s;
        }
        .bubble-link:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 왼쪽 사이드바 영역 -->
        <div class="sidebar">
            <div class="header">
                <h1>🌿 초록지구 탐색기 🌿</h1>
                <!-- 귀여운 검색창 -->
                <div class="search-box">
                    <input type="text" id="keywordInput" class="search-input" placeholder="가게 이름을 입력해봐!" onkeypress="if(event.keyCode==13) searchShopByName();">
                    <button class="search-btn" onclick="searchShopByName()">🔍</button>
                </div>
            </div>
            
            <!-- 친환경 컨셉 탭 버튼 메뉴 -->
            <div class="tab-container">
                <button id="tabRefill" class="tab-button tab-refill active" onclick="changeTab('제로웨이스트')">🛒 리필/제로샵</button>
                <button id="tabVintage" class="tab-button tab-vintage" onclick="changeTab('빈티지숍')">🧸 개념소비 빈티지</button>
            </div>
            
            <!-- 리스트 출력 공간 -->
            <div id="placesList" class="results-list"></div>
        </div>

        <!-- 오른쪽 카카오 지도 영역 -->
        <div id="map" class="map-area"></div>
    </div>

    <script>
        // 전역 변수 설정
        let map;
        let placeService;
        let currentMarkers = [];
        let currentOverlay = null;
        let currentKeyword = "제로웨이스트"; // 초기 검색 키워드
        
        // 위치 권한 거부 또는 대기 시 활용할 기본 좌표 (서울 성수동 근처)
        let userLatitude = 37.5446; 
        let userLongitude = 127.0561;

        // 고정 등록 데이터셋
        const customEcoShops = [
            { id: "c1", place_name: "지구샵 연남점", phone: "070-7721-1555", address_name: "서울 마포구 성미산로 155", place_url: "https://map.kakao.com/?q=지구샵%20연남점", x: "126.920556", y: "37.564532", desc: "수-일 11:00-21:00 (월화 휴무)" },
            { id: "c2", place_name: "더피커 (the picker)", phone: "070-4112-1130", address_name: "서울 성동구 왕십리로 115", place_url: "https://map.kakao.com/?q=더피커", x: "127.043542", y: "37.547348", desc: "국내 최초의 제로웨이스트 가치 플랫폼" },
            { id: "c3", place_name: "디어얼스 (Dear Earth)", phone: "0507-1351-4022", address_name: "서울 서대문구 수색로 43", place_url: "https://map.kakao.com/?q=디어얼스", x: "126.911674", y: "37.570776", desc: "지속가능한 일상을 돕는 제로웨이스트 메이커" },
            { id: "c4", place_name: "송포어스 (SongforEarth)", phone: "070-8095-3507", address_name: "서울 강동구 풍성로35길 34", place_url: "https://map.kakao.com/?q=송포어스", x: "127.127814", y: "37.534241", desc: "동네를 밝히는 다정한 에코 라이프스타일 샵" },
            { id: "c5", place_name: "알맹상점 껍데기점", phone: "070-7776-1825", address_name: "서울 마포구 월드컵로49 2층", place_url: "https://map.kakao.com/?q=알맹상점", x: "126.909564", y: "37.553755", desc: "알맹이만 가와라! 유명한 1세대 제로웨이스트샵" },
            { id: "c6", place_name: "알맹상점 리스테이션", phone: "0507-1397-1825", address_name: "서울 중구 한강대로 405 서울역 4층", place_url: "https://map.kakao.com/?q=알맹상점%20리스테이션", x: "126.971019", y: "37.554668", desc: "서울역 옥상정원과 연결된 자원회수 거점 공간" },
            { id: "c7", place_name: "지구자판기", phone: "0507-1349-2155", address_name: "서울 마포구 성미산로29길 30", place_url: "https://map.kakao.com/?q=지구자판기", x: "126.924881", y: "37.566120", desc: "플라스틱 프리 라이프를 제안하는 귀여운 가게" },
            { id: "c8", place_name: "순순한상점", phone: "0507-1428-5601", address_name: "경기 부천시 소사구 경인로 222", place_url: "https://map.kakao.com/?q=순순한상점", x: "126.790112", y: "37.485121", desc: "자연에 순하고 사람에게 순한 무포장 리필샵" }
        ];

        // 1. 초기 위치 권한 확인 후 지도 구동
        kakao.maps.load(function () {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    initMap(); 
                }, function (error) {
                    console.log("위치 권한 거부 등으로 기본 좌표(성수동)를 사용합니다.");
                    initMap(); 
                });
            } else {
                initMap();
            }
        });

        // 2. 지도 및 검색 인프라 가동
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLatitude, userLongitude), // 내 위치 중심
                level: 8 // 전국 매장들이 시원하게 잘 보이도록 지도 배율을 좀 더 광역(Level 8)으로 설정!
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places(); 

            showUserLocationPin(); // 내 실제 서 있는 곳 파란 점 표시
            fetchEcoPlaces(); // 전국구 탐색 작동
        }

        // 3. 내 현재 위치 파란 점 표시
        function showUserLocationPin() {
            const userPosition = new kakao.maps.LatLng(userLatitude, userLongitude);
            const pinImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png';
            const pinSize = new kakao.maps.Size(30, 30);
            const markerImage = new kakao.maps.MarkerImage(pinImageUrl, pinSize);

            new kakao.maps.Marker({
                position: userPosition,
                image: markerImage,
                map: map
            });
        }

        // 4. 탭 이동 스위칭 함수
        function changeTab(tabType) {
            const tabRefill = document.getElementById('tabRefill');
            const tabVintage = document.getElementById('tabVintage');

            if (tabType === '제로웨이스트') {
                tabRefill.classList.add('active');
                tabVintage.classList.remove('active');
                currentKeyword = "제로웨이스트";
            } else {
                tabVintage.classList.add('active');
                tabRefill.classList.remove('active');
                currentKeyword = "빈티지숍";
            }

            document.getElementById('keywordInput').value = ""; 
            fetchEcoPlaces(); 
        }

        // 5. 검색창 기능
        function searchShopByName() {
            const searchInputText = document.getElementById('keywordInput').value.trim();
            if (!searchInputText) {
                alert("찾고 싶은 가게의 이름을 적어줘! 예) 알맹상점");
                return;
            }
            fetchEcoPlaces(searchInputText + " " + currentKeyword, true);
        }

        // 6. 데이터 소싱 코어 (★반경 2km 제한 완전히 해제해서 전국 스캔★)
        function fetchEcoPlaces(customQuery, isSearchMode = false) {
            clearOldMarkers();
            if (currentOverlay) currentOverlay.setMap(null);

            const finalQuery = customQuery || currentKeyword;
            let combinedData = [];

            if (currentKeyword === "제로웨이스트") {
                const pureSearchText = customQuery ? customQuery.replace(" 제로웨이스트", "").trim() : "";
                const filteredCustom = customEcoShops.filter(shop => 
                    shop.place_name.includes(pureSearchText) || shop.address_name.includes(pureSearchText)
                );
                combinedData = [...filteredCustom];
            }

            // 카카오 지도 검색 조건 옵션 (★radius 항목을 지워서 전국 단위 와이드 탐색 작동★)
            const searchOptions = {
                location: new kakao.maps.LatLng(userLatitude, userLongitude),
                sort: kakao.maps.services.SortBy.DISTANCE
            };

            placeService.keywordSearch(finalQuery, function(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    combinedData = [...combinedData, ...data];
                }

                // 중복 데이터 병합 필터링
                const uniqueData = combinedData.filter((item, index, self) =>
                    index === self.findIndex((t) => t.place_name === item.place_name)
                );

                const listContainer = document.getElementById('placesList');
                
                if (uniqueData.length > 0) {
                    renderListAndMarkers(uniqueData);
                    
                    // 직접 검색했을 경우 검색된 1순위 매장 방향으로 화면을 즉시 이동
                    if (isSearchMode && data.length > 0) {
                        const firstMovePos = new kakao.maps.LatLng(data[0].y, data[0].x);
                        map.setCenter(firstMovePos);
                    }
                } else {
                    alert("원하는 매장을 찾지 못했어 😢 대신 전국의 알찬 리스트로 다시 화면을 채워줄게!");
                    document.getElementById('keywordInput').value = ""; 
                    fetchEcoPlaces(); 
                }
            }, searchOptions);
        }

        // 7. 귀여운 원형 이모지 커스텀 마커 제작 및 렌더링
        function renderListAndMarkers(shopList) {
            const listContainer = document.getElementById('placesList');
            listContainer.innerHTML = ''; 

            const isRefill = (currentKeyword === '제로웨이스트');
            const emojiIcon = isRefill ? '🛒' : '🧸';
            const borderThemeColor = isRefill ? '#4caf50' : '#ff9800';

            shopList.forEach((shop) => {
                const shopPosition = new kakao.maps.LatLng(shop.y, shop.x);

                // 이미지 대신 동글동글 원형 🛒 / 🧸 커스텀 이모지 레이어 생성
                const markerContent = document.createElement('div');
                markerContent.className = 'cute-marker';
                markerContent.style.borderColor = borderThemeColor;
                markerContent.innerHTML = emojiIcon;

                const cuteOverlayMarker = new kakao.maps.CustomOverlay({
                    position: shopPosition,
                    content: markerContent,
                    xAnchor: 0.5,
                    yAnchor: 0.5
                });

                cuteOverlayMarker.setMap(map);
                currentMarkers.push(cuteOverlayMarker); 

                // 왼쪽 리스트 바인딩
                const itemElement = document.createElement('div');
                itemElement.className = 'place-item';
                let descHtml = shop.desc ? `<div class="place-desc">💡 ${shop.desc}</div>` : '';
                
                itemElement.innerHTML = `
                    <div class="place-name">${shop.place_name}</div>
                    ${descHtml}
                    <div class="place-phone">📞 ${shop.phone || '전화번호 미등록'}</div>
                `;

                const selectEventAction = function () {
                    map.panTo(shopPosition);
                    openArrowOverlay(shop, shopPosition);
                };

                itemElement.onclick = selectEventAction;
                markerContent.onclick = selectEventAction;

                listContainer.appendChild(itemElement);
            });
        }

        // 8. 말풍선 피어오르기 기능
        function openArrowOverlay(shop, position) {
            if (currentOverlay) {
                currentOverlay.setMap(null);
            }

            const themeColor = (currentKeyword === '제로웨이스트') ? '#4caf50' : '#ff9800';
            const titleColor = (currentKeyword === '제로웨이스트') ? '#1b5e20' : '#e65100';
            let infoHtml = shop.desc ? `<div class="bubble-info">📝 ${shop.desc}</div>` : `<div class="bubble-info">📍 ${shop.address_name || '주소 정보 없음'}</div>`;

            const bubbleContent = `
                <div class="custom-bubble" style="border-color: ${themeColor};">
                    <div class="bubble-title" style="color: ${titleColor};">✨ ${shop.place_name}</div>
                    ${infoHtml}
                    <div class="bubble-phone">📱 ${shop.phone || '번호 없음'}</div>
                    <a class="bubble-link" href="${shop.place_url}" target="_blank" style="background-color: ${themeColor};">카카오맵 정보 보기 ↗</a>
                </div>
            `;

            currentOverlay = new kakao.maps.CustomOverlay({
                content: bubbleContent,
                position: position,
                xAnchor: 0.5,
                yAnchor: 1.0 
            });

            currentOverlay.setMap(map);
        }

        // 9. 마커 지우기
        function clearOldMarkers() {
            currentMarkers.forEach(marker => marker.setMap(null));
            currentMarkers = [];
        }
    </script>
</body>
</html>
